name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate seed pack
        run: npm test

      - name: Get dependencies
        working-directory: ./ages_app
        run: flutter pub get

      - name: Analyze
        working-directory: ./ages_app
        run: flutter analyze

      - name: Test
        working-directory: ./ages_app
        run: flutter test

      - name: Build web
        working-directory: ./ages_app
        run: flutter build web --release --base-href /

      - name: Configure custom domain
        run: echo "ages.lightsword.app" > ./ages_app/build/web/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ages_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4